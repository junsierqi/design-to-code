<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Design-to-code Pipeline Example</title>
</head>
<body>
  <main>
    <h1>Project health</h1>
    <label for="search">Search projects</label>
    <input id="search" placeholder="Search projects" oninput="filterProjects()">
    <button id="create-project" onclick="openCreate()">Create project</button>
    <div role="status" id="status" aria-live="polite"></div>
  </main>
  <script>
    function filterProjects() {
      document.querySelector('#status').textContent = 'Filter updated';
    }
    function openCreate() {
      document.querySelector('#status').textContent = 'Create project opened';
    }
  </script>
</body>
</html>
